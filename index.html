<!DOCTYPE html>
<html lang="en">

<!-- HTML structure for the Daily Work Tracker app -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Work Tracker Pro</title>







    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="card">
        <h1>Daily Work Tracker</h1>
        <div id="clock"></div>
    </div>

    <div class="card">
        <h2>Today's Work</h2>

        <table>
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Allocated Hours</th>
                    <th>Achieved Hours</th>
                    <th id="commentHeader" style="display:none;">Comment</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>

        <br>

        <div class="actionButtons">
            <button id="addBtn" type="button">➕ Add Subject</button>
            <button id="saveAllocatedBtn" type="button">⏱️ Save Allocated Hour</button>
            <button id="saveDayBtn" type="button">💾 Save Day</button>
        </div>
        <div id="saveStatus" class="status"></div>

        <br>

        <table>
            <tr>
                <th>Total Allocated</th>
                <th>Total Achieved</th>
                <th>Success Rate</th>
                <th>Remark</th>
            </tr>

            <tr>
                <td id="allocated">0 hrs</td>
                <td id="achieved">0 hrs</td>
                <td id="rate">0%</td>
                <td id="todayRemark">🔴 Needs Improvement</td>
            </tr>
        </table>

    </div>



    <h3 id="weekStatus"></h3>
    </div>

    <div class="card">
        <h2>📅 Previous Days History</h2>
        <div id="historyTables"></div>
        <div id="historyDetailsWrapper" style="display:none">
            <div id="historyDetails" style="margin-top:15px"></div>
        </div>
    </div>

    <div class="card">
        <h2>📊 Current Month Weekly Reports</h2>
        <div id="weekHistory"></div>
    </div>

    <div class="card">
        <h2>📆 Monthly Reports</h2>
        <div id="monthHistory"></div>
    </div>







    <template id="subjectRowTemplate">
        <tr>
            <td>
                <select class="subject">
                    <option value="">Select Subject</option>
                    <option value="Vocabulary">Vocabulary</option>
                    <option value="History">History</option>
                    <option value="Geography">Geography</option>
                    <option value="English">English</option>
                    <option value="Odia">Odia</option>
                    <option value="Polity">Polity</option>
                    <option value="Economic">Economic</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Reasoning">Reasoning</option>
                    <option value="Data Interpretation">Data Interpretation</option>
                    <option value="Computer">Computer</option>
                    <option value="Environment">Environment</option>
                    <option value="Current Affairs">Current Affairs</option>
                    <option value="Art and Culture">Art and Culture</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Static GK">Static Gk</option>
                    <option value="Odisha Gk">Odisha Gk</option>
                    <option value="Mock Tests">Mock Tests</option>
                </select>
            </td>
            <td><input type="text" class="given" placeholder="H:MM"></td>
            <td><input type="text" class="done" placeholder="H:MM"></td>
            <td class="commentCell" style="display:none;">
                <input type="text" class="comment" placeholder="Comment">
            </td>
            <td>
                <button type="button" class="remove-row-btn">❌</button>
            </td>
        </tr>
    </template>

    <script type="module" src="script.js"></script>
</body>

</html>
